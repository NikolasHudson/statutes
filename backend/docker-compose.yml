services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: corpus
      POSTGRES_PASSWORD: corpus
      POSTGRES_DB: corpus
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U corpus -d corpus"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
