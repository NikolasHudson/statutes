name: statutes
region: nyc
features:
- buildpack-stack=ubuntu-22
databases:
- name: iowa-db
  engine: PG
  production: true
  cluster_name: iowa-db
  db_name: defaultdb
  db_user: doadmin
# Secret values are NOT committed. SECRET_KEY / OPENAI_API_KEY /
# VOYAGE_API_KEY are already set as encrypted env vars on the App Platform
# app; App Platform preserves an existing SECRET value when the spec omits
# it. Set/rotate them in the App Platform UI or via `doctl`. Never commit
# plaintext here.
envs:
- key: SECRET_KEY
  scope: RUN_AND_BUILD_TIME
  type: SECRET
- key: OPENAI_API_KEY
  scope: RUN_AND_BUILD_TIME
  type: SECRET
- key: VOYAGE_API_KEY
  scope: RUN_AND_BUILD_TIME
  type: SECRET
- key: DATABASE_URL
  scope: RUN_AND_BUILD_TIME
  value: ${iowa-db.DATABASE_URL}
- key: DEBUG
  scope: RUN_AND_BUILD_TIME
  value: "False"
- key: ALLOWED_HOSTS
  scope: RUN_TIME
  value: "*"
- key: CSRF_TRUSTED_ORIGINS
  scope: RUN_TIME
  value: https://${APP_DOMAIN}
- key: CHAT_DAILY_USER_LIMIT
  scope: RUN_TIME
  value: "50"
- key: CHAT_MONTHLY_GLOBAL_LIMIT
  scope: RUN_TIME
  value: "20000"
# Ingress rules are evaluated top-down; first prefix match wins. Keep
# /api and /admin pointed at Django, /chat at the Next.js app, and the
# catch-all '/' at Django so the existing Vite SPA keeps serving the root.
ingress:
  rules:
  - match:
      path:
        prefix: /chat
    component:
      name: chat-frontend
      preserve_path_prefix: true
  # preserve_path_prefix MUST be true here too. Without it App Platform
  # strips the matched prefix before forwarding, so Django sees /auth/login
  # instead of /api/auth/login and returns 500. The old single-rule spec
  # (prefix: /) didn't hit this because nothing was stripped.
  - match:
      path:
        prefix: /api
    component:
      name: statutes
      preserve_path_prefix: true
  - match:
      path:
        prefix: /admin
    component:
      name: statutes
      preserve_path_prefix: true
  - match:
      path:
        prefix: /
    component:
      name: statutes
      preserve_path_prefix: true
services:
- name: statutes
  dockerfile_path: /Dockerfile
  source_dir: /
  github:
    repo: NikolasHudson/statutes
    branch: main
    deploy_on_push: true
  http_port: 8080
  instance_count: 1
  instance_size_slug: apps-s-1vcpu-1gb
# The assistant-ui Next.js app. Same repo, lives in /chat-frontend, ships
# its own Dockerfile (Node 20). Mounted at /chat/* by the ingress rule
# above; basePath in next.config.ts matches so its router knows about it.
- name: chat-frontend
  dockerfile_path: /chat-frontend/Dockerfile
  source_dir: /chat-frontend
  github:
    repo: NikolasHudson/statutes
    branch: main
    deploy_on_push: true
  http_port: 8080
  instance_count: 1
  instance_size_slug: apps-s-1vcpu-0.5gb
  envs:
  - key: NEXT_PUBLIC_BASE_PATH
    scope: RUN_AND_BUILD_TIME
    value: /chat
