name: statutes
region: nyc
features:
- buildpack-stack=ubuntu-22
# Custom domain. Without this, re-applying the spec wipes whatever domain
# was attached via the DO panel — that's how we lost corpus.nick.law on
# the first spec re-paste. Keep this in source so the domain is tied to
# the spec, not just the panel state.
domains:
- domain: corpus.nick.law
  type: PRIMARY
databases:
- name: iowa-db
  engine: PG
  production: true
  cluster_name: iowa-db
  db_name: defaultdb
  db_user: doadmin
# Secret values are NOT committed. SECRET_KEY / OPENAI_API_KEY /
# VOYAGE_API_KEY are already set as encrypted env vars on the App Platform
# app; App Platform preserves an existing SECRET value when the spec omits
# it. Set/rotate them in the App Platform UI or via `doctl`. Never commit
# plaintext here.
envs:
- key: SECRET_KEY
  scope: RUN_AND_BUILD_TIME
  type: SECRET
- key: OPENAI_API_KEY
  scope: RUN_AND_BUILD_TIME
  type: SECRET
- key: VOYAGE_API_KEY
  scope: RUN_AND_BUILD_TIME
  type: SECRET
- key: DATABASE_URL
  scope: RUN_AND_BUILD_TIME
  value: ${iowa-db.DATABASE_URL}
- key: DEBUG
  scope: RUN_AND_BUILD_TIME
  value: "False"
- key: ALLOWED_HOSTS
  scope: RUN_TIME
  value: "*"
- key: CSRF_TRUSTED_ORIGINS
  scope: RUN_TIME
  value: https://${APP_DOMAIN}
- key: CHAT_DAILY_USER_LIMIT
  scope: RUN_TIME
  value: "50"
- key: CHAT_MONTHLY_GLOBAL_LIMIT
  scope: RUN_TIME
  value: "20000"
# Ingress rules are evaluated top-down; first prefix match wins. The Next.js
# chat-frontend serves the entire SPA at "/"; Django keeps /api/* and
# /admin/*. preserve_path_prefix is REQUIRED everywhere — without it App
# Platform strips the matched prefix before forwarding (so /api/auth/login
# would reach Django as /auth/login).
ingress:
  rules:
  - match:
      path:
        prefix: /api
    component:
      name: statutes
      preserve_path_prefix: true
  - match:
      path:
        prefix: /admin
    component:
      name: statutes
      preserve_path_prefix: true
  - match:
      path:
        prefix: /
    component:
      name: chat-frontend
      preserve_path_prefix: true
services:
# Django: API + admin only. WhiteNoise serves Django admin's own static.
- name: statutes
  dockerfile_path: /Dockerfile
  source_dir: /
  github:
    repo: NikolasHudson/statutes
    branch: main
    deploy_on_push: true
  http_port: 8080
  instance_count: 1
  instance_size_slug: apps-s-1vcpu-1gb
# Next.js assistant-ui app: the canonical frontend. Lives in /chat-frontend
# in the repo and ships its own Node 20 Dockerfile. Mounted at / by the
# ingress rule above; no basePath since it owns the root.
- name: chat-frontend
  dockerfile_path: /chat-frontend/Dockerfile
  source_dir: /chat-frontend
  github:
    repo: NikolasHudson/statutes
    branch: main
    deploy_on_push: true
  http_port: 8080
  instance_count: 1
  instance_size_slug: apps-s-1vcpu-0.5gb
