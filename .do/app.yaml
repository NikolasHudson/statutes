name: statutes
region: nyc
features:
- buildpack-stack=ubuntu-22
databases:
- name: iowa-db
  engine: PG
  production: true
  cluster_name: iowa-db
  db_name: defaultdb
  db_user: doadmin
# Secret values are NOT committed. SECRET_KEY / OPENAI_API_KEY /
# VOYAGE_API_KEY are already set as encrypted env vars on the App Platform
# app; App Platform preserves an existing SECRET value when the spec omits
# it. Set/rotate them in the App Platform UI or via `doctl`. Never commit
# plaintext here.
envs:
- key: SECRET_KEY
  scope: RUN_AND_BUILD_TIME
  type: SECRET
- key: OPENAI_API_KEY
  scope: RUN_AND_BUILD_TIME
  type: SECRET
- key: VOYAGE_API_KEY
  scope: RUN_AND_BUILD_TIME
  type: SECRET
- key: DATABASE_URL
  scope: RUN_AND_BUILD_TIME
  value: ${iowa-db.DATABASE_URL}
- key: DEBUG
  scope: RUN_AND_BUILD_TIME
  value: "False"
- key: ALLOWED_HOSTS
  scope: RUN_TIME
  value: "*"
- key: CSRF_TRUSTED_ORIGINS
  scope: RUN_TIME
  value: https://${APP_DOMAIN}
- key: CHAT_DAILY_USER_LIMIT
  scope: RUN_TIME
  value: "50"
- key: CHAT_MONTHLY_GLOBAL_LIMIT
  scope: RUN_TIME
  value: "20000"
ingress:
  rules:
  - component:
      name: statutes
    match:
      path:
        prefix: /
services:
- name: statutes
  dockerfile_path: /Dockerfile
  source_dir: /
  github:
    repo: NikolasHudson/statutes
    branch: main
    deploy_on_push: true
  http_port: 8080
  instance_count: 1
  instance_size_slug: apps-s-1vcpu-1gb
